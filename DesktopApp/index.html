<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!--
    CSP is enforced at the session level in WindowManager.ts (main process)
    for production builds (file:// loads). In dev mode the Vite HMR client
    requires 'unsafe-inline' styles, so the session hook is skipped and this
    meta tag is the active policy — it intentionally allows unsafe-inline for
    dev convenience only.
  -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:;" />
  <link rel="icon" type="image/png" href="/assets/icons/icon.png" />
  <title>Wyre</title>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/renderer/index.ts"></script>
</body>
</html>
