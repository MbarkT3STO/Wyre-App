name: Android APK Build

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ─────────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. JDK 17 ──────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      # ── 5. Cache Gradle ────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('AndroidApp/android/**/*.gradle*', 'AndroidApp/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # ── 6. Install JS dependencies ─────────────────────────────────────────
      - name: Install JS dependencies
        working-directory: AndroidApp
        run: npm install

      # ── 7. Build web layer ─────────────────────────────────────────────────
      - name: Build web layer
        working-directory: AndroidApp
        run: npm run build

      # ── 8. Capacitor sync ──────────────────────────────────────────────────
      - name: Capacitor sync
        working-directory: AndroidApp
        run: npx cap sync android

      # ── 9. Gradle wrapper jar ──────────────────────────────────────────────
      - name: Download Gradle wrapper jar
        working-directory: AndroidApp/android
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      # ── 10. Build APK ──────────────────────────────────────────────────────
      - name: Build APK
        working-directory: AndroidApp/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # ── 11. Rename APK to include version/commit ───────────────────────────
      - name: Rename APK
        run: |
          mkdir -p output
          cp AndroidApp/android/app/build/outputs/apk/debug/app-debug.apk \
             output/Wyre-${{ github.ref_name }}-${{ github.sha }}.apk

      # ── 12. Upload APK as artifact (every build) ───────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Wyre-APK-${{ github.ref_name }}
          path: output/Wyre-*.apk
          retention-days: 30

      # ── 13. Create GitHub Release with APK attached (on version tags) ──────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Wyre ${{ github.ref_name }}
          body: |
            ## Wyre ${{ github.ref_name }}

            ### Install
            1. Download `Wyre-${{ github.ref_name }}.apk` below
            2. On your Android phone: **Settings → Security → Install unknown apps** → enable for your browser/file manager
            3. Open the downloaded APK and tap Install

            ### Requirements
            - Android 6.0 (API 23) or higher
            - Both devices on the same WiFi network
          files: output/Wyre-*.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
