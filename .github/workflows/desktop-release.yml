name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── macOS ──────────────────────────────────────────────────────────────────
  build-mac:
    name: Build macOS (dmg)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: DesktopApp/package-lock.json

      - name: Install dependencies
        working-directory: DesktopApp
        run: npm ci

      - name: Build & package (x64 + arm64)
        working-directory: DesktopApp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package -- --mac --x64 --arm64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-mac
          path: |
            DesktopApp/release/*.dmg
            DesktopApp/release/*.dmg.blockmap
          retention-days: 7

  # ── Windows ────────────────────────────────────────────────────────────────
  build-win:
    name: Build Windows (nsis + portable)
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: DesktopApp/package-lock.json

      - name: Install dependencies
        working-directory: DesktopApp
        run: npm ci

      - name: Build & package (x64)
        working-directory: DesktopApp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package -- --win --x64

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-win
          path: |
            DesktopApp/release/*.exe
            DesktopApp/release/*.exe.blockmap
          retention-days: 7

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux (AppImage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: DesktopApp/package-lock.json

      - name: Install dependencies
        working-directory: DesktopApp
        run: npm ci

      - name: Build & package (x64)
        working-directory: DesktopApp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package -- --linux --x64

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            DesktopApp/release/*.AppImage
          retention-days: 7

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-mac
          path: release-files

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-win
          path: release-files

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-linux
          path: release-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Wyre ${{ github.ref_name }}
          body: |
            ## Wyre ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `Wyre-*-arm64.dmg` | M1/M2/M3 Macs |
            | macOS (Intel) | `Wyre-*-x64.dmg` | Intel Macs |
            | Windows | `Wyre-*-Setup.exe` | NSIS installer |
            | Windows | `Wyre-*-Portable.exe` | No install needed |
            | Linux | `Wyre-*.AppImage` | Make executable, then run |

            ### Requirements
            - Both devices on the same local network
            - macOS 11+, Windows 10+, or a modern Linux distro

            ### Linux quick start
            ```bash
            chmod +x Wyre-*.AppImage
            ./Wyre-*.AppImage
            ```
          files: release-files/**/*
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
